<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LIGO 顔ナビ</title>
<style>
  :root {
    --bg: #f6f8fb;
    --canvas: #f1f5f9;
    --panel: #ffffff;
    --line: #e6ebf2;
    --ink: #0f172a;
    --sub: #64748b;
    --accent: #06b6d4;
    --accent-soft: #cffafe;
    --accent-dark: #0e7490;
    --shadow: 0 1px 2px rgba(15,23,42,.05), 0 4px 12px rgba(15,23,42,.08);
    --shadow-hover: 0 4px 12px rgba(15,23,42,.1), 0 12px 32px rgba(6,182,212,.18);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-rows: 56px auto 1fr;
    height: 100vh;
  }
  .app > header { grid-row: 1; }
  .app > .snapshot-banner { grid-row: 2; }
  .app > .canvas-wrap,
  .app > .list-wrap,
  .app > .history-wrap {
    grid-row: 3;
    min-height: 0;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 0 18px;
    border-bottom: 1px solid var(--line);
    background: #fff; z-index: 10;
  }
  .brand { font-weight: 700; color: var(--accent); letter-spacing: .04em; }
  .brand span { color: var(--ink); font-weight: 600; margin-left: 6px; }
  .rank-legend {
    display: flex; gap: 6px;
    font-size: 11px;
    color: var(--sub);
    align-items: center;
  }
  .rank-legend .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 4px;
  }
  .search { position: relative; margin-left: auto; width: 260px; }
  .search input {
    width: 100%; padding: 7px 12px 7px 32px;
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; outline: none; background: #fff;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--sub); }
  .toolbar { display: flex; gap: 6px; }
  .btn {
    border: 1px solid var(--line); background: #fff; color: var(--ink);
    font-size: 12px; padding: 6px 10px; border-radius: 6px;
    cursor: pointer; transition: all .12s; font-family: inherit;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-label { font-size: 12px; color: var(--sub); min-width: 44px; text-align: center; }

  .view-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 2px;
  }
  .view-toggle button {
    border: 0;
    background: transparent;
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--sub);
    font-family: inherit;
  }
  .view-toggle button.active { background: var(--accent); color: #fff; }

  /* Admin permission only restricts snapshot operations. */
  /* Regular editing (role/dept/parent) is always available. */
  body.readonly .snap-take,
  body.readonly .snap-delete {
    display: none !important;
  }
  body.snapshot-view .edit-btn,
  body.snapshot-view .row-delete,
  body.snapshot-view #btnAdd,
  body.snapshot-view #btnAddList {
    display: none !important;
  }
  body.snapshot-view select.cell-select,
  body.snapshot-view input.cell-input {
    pointer-events: none;
    background: #f8fafc;
    color: var(--sub);
  }

  .snapshot-banner {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    color: #78350f;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 600;
    z-index: 11;
    border-bottom: 1px solid #d97706;
  }
  .snapshot-banner.hide { display: none; }
  .snapshot-banner button {
    margin-left: auto;
    padding: 5px 12px;
    background: rgba(0,0,0,.15);
    border: 0;
    border-radius: 6px;
    color: #78350f;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
  }
  .snapshot-banner button:hover { background: rgba(0,0,0,.25); }

  .history-wrap {
    overflow: auto;
    padding: 16px;
    background: var(--bg);
  }
  .history-wrap.hide { display: none; }
  .history-head {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .history-head h2 {
    font-size: 16px;
    margin: 0;
  }
  .snap-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .snap-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .snap-card .snap-title {
    font-size: 14px;
    font-weight: 700;
  }
  .snap-card .snap-meta {
    font-size: 11px;
    color: var(--sub);
  }
  .snap-card .snap-desc {
    font-size: 12px;
    color: var(--ink);
    margin-top: 4px;
  }
  .snap-card .snap-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .snap-card .snap-actions button {
    flex: 1;
    min-width: 60px;
    padding: 5px 8px;
    font-size: 11px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  .snap-card .snap-actions button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .snap-card .snap-actions .snap-delete:hover {
    border-color: #fca5a5;
    color: #dc2626;
  }
  .snap-card .snap-type {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }
  .snap-card .snap-type.current { background: #dbeafe; color: #1e40af; }
  .snap-card .snap-type.future { background: #fce7f3; color: #9d174d; }
  .admin-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    color: #15803d;
    background: #dcfce7;
    border: 1px solid #86efac;
    font-weight: 600;
  }

  .canvas-wrap {
    position: relative; overflow: hidden; background: var(--canvas);
    background-image:
      linear-gradient(to right, rgba(15,23,42,.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(15,23,42,.04) 1px, transparent 1px);
    background-size: 24px 24px;
    cursor: grab;
  }
  .canvas-wrap.hide { display: none; }

  .list-wrap {
    overflow: auto;
    background: var(--bg);
    padding: 16px;
  }
  .list-wrap.hide { display: none; }
  .list-toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .list-toolbar .filter {
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 12px;
    background: #fff;
    font-family: inherit;
    outline: none;
  }
  .list-toolbar .filter:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .list-count { font-size: 12px; color: var(--sub); margin-left: auto; }

  table.member-table {
    width: 100%;
    background: #fff;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    font-size: 13px;
  }
  table.member-table thead {
    background: #f8fafc;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  table.member-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--sub);
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  table.member-table th.sort-asc::after { content: " ▲"; font-size: 9px; }
  table.member-table th.sort-desc::after { content: " ▼"; font-size: 9px; }
  table.member-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  table.member-table tbody tr:hover { background: #f8fafc; }
  table.member-table tbody tr.on-leave-row { background: #fafafa; opacity: .8; }
  table.member-table tbody tr.on-leave-row:hover { opacity: 1; }
  table.member-table .table-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--accent-soft);
    display: grid; place-items: center;
    color: var(--accent-dark);
    font-weight: 700;
    font-size: 12px;
  }
  table.member-table .table-avatar img { width: 100%; height: 100%; object-fit: cover; }
  table.member-table .name-cell {
    font-weight: 600;
    white-space: nowrap;
  }
  table.member-table select.cell-select {
    padding: 4px 6px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: transparent;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    max-width: 220px;
    width: 100%;
  }
  table.member-table select.cell-select:hover, table.member-table select.cell-select:focus {
    border-color: var(--accent);
    background: #fff;
  }
  table.member-table .status-cell select { width: auto; }
  table.member-table .meta-cell { color: var(--sub); font-size: 11px; }
  table.member-table input.cell-input {
    padding: 5px 8px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    outline: none;
    width: 120px;
  }
  table.member-table input.cell-input:hover, table.member-table input.cell-input:focus {
    border-color: var(--accent);
    background: #fff;
  }
  table.member-table button.row-delete {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    color: #94a3b8;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 0;
    transition: all .12s;
  }
  table.member-table button.row-delete:hover {
    background: #fee2e2;
    color: #dc2626;
    border-color: #fca5a5;
  }
  .canvas-wrap.panning { cursor: grabbing; }
  .canvas {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0; will-change: transform;
  }
  .canvas svg {
    position: absolute; top: 0; left: 0;
    pointer-events: none; overflow: visible;
  }
  .rank-band {
    position: absolute;
    left: 0;
    height: 130px;
    background: rgba(6,182,212,.04);
    border-top: 1px dashed rgba(6,182,212,.25);
    border-bottom: 1px dashed rgba(6,182,212,.25);
    pointer-events: none;
  }
  .rank-band-label {
    position: absolute;
    left: 12px;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-dark);
    background: rgba(255,255,255,.95);
    padding: 2px 8px;
    border-radius: 4px;
    pointer-events: none;
  }
  .node {
    position: absolute;
    width: 132px;
    background: #fff;
    border-radius: 12px;
    padding: 8px;
    box-shadow: var(--shadow);
    border: 1.5px solid transparent;
    cursor: grab;
    user-select: none;
    transition: box-shadow .12s, border-color .12s;
    text-align: center;
  }
  .node:hover { box-shadow: var(--shadow-hover); border-color: var(--accent-soft); }
  .node.dragging {
    cursor: grabbing;
    box-shadow: 0 8px 24px rgba(6,182,212,.4);
    border-color: var(--accent);
    z-index: 100;
  }
  .node.dim { opacity: .22; }
  .node.match { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-hover); }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    margin: 0 auto 4px;
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 20px;
    border: 2px solid #fff;
    box-shadow: 0 0 0 2px var(--accent-soft);
    overflow: hidden;
    position: relative;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }
  .node-role {
    font-size: 10px;
    color: var(--accent-dark);
    background: var(--accent-soft);
    border-radius: 4px;
    padding: 1px 6px;
    display: inline-block;
    margin-bottom: 4px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .node-name { font-size: 13px; font-weight: 700; line-height: 1.2; margin-bottom: 2px; }
  .node-meta { font-size: 10px; color: var(--sub); line-height: 1.3; }
  .node.dept-rect {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: #fff;
    width: 132px;
    padding: 8px 10px;
    min-height: 56px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .node.dept-rect .dept-title { font-size: 13px; font-weight: 700; text-align: center; }
  .node.dept-rect .dept-sub { font-size: 10px; text-align: center; opacity: .85; margin-top: 2px; }
  .status-badge {
    position: absolute;
    top: 4px; left: 4px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fbbf24;
    z-index: 5;
    letter-spacing: .02em;
  }
  .status-badge.sankyu { background: #fce7f3; color: #9d174d; border-color: #f9a8d4; }
  .status-badge.ikukyu { background: #dbeafe; color: #1e3a8a; border-color: #93c5fd; }
  .status-badge.kyushoku { background: #f3f4f6; color: #374151; border-color: #d1d5db; }
  .node.on-leave { opacity: .85; }
  .node.on-leave:hover { opacity: 1; }
  .leave-section-label {
    position: absolute;
    font-size: 13px;
    font-weight: 700;
    color: var(--sub);
    background: rgba(255,255,255,.95);
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px dashed var(--line);
    pointer-events: none;
  }
  .hint {
    position: absolute;
    bottom: 12px; left: 12px;
    background: rgba(15,23,42,.7);
    color: #fff; font-size: 11px;
    padding: 6px 10px; border-radius: 6px;
    pointer-events: none; z-index: 50;
  }
  .edit-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,.95);
    border: 1px solid var(--line);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--sub);
    font-size: 12px;
    line-height: 1;
    z-index: 10;
  }
  .node:hover .edit-btn { display: flex; }
  .edit-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 24px;
    width: 380px;
    max-width: calc(100vw - 40px);
    box-shadow: 0 20px 50px rgba(0,0,0,.2);
  }
  .modal h3 {
    margin: 0 0 4px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal h3 .av {
    width: 36px; height: 36px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--accent-soft);
    display: grid; place-items: center;
    color: var(--accent-dark);
    font-weight: 700;
  }
  .modal h3 .av img { width: 100%; height: 100%; object-fit: cover; }
  .modal .modal-sub {
    color: var(--sub);
    font-size: 12px;
    margin-bottom: 18px;
    margin-left: 46px;
  }
  .modal label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--sub);
    margin-top: 14px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .modal select, .modal input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    font-family: inherit;
    outline: none;
  }
  .modal select:focus, .modal input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .modal-buttons {
    margin-top: 22px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-buttons .btn { padding: 8px 14px; }
  .modal-buttons .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .modal-buttons .btn.primary:hover {
    background: var(--accent-dark);
    border-color: var(--accent-dark);
    color: #fff;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">LIGO<span>顔ナビ</span></div>
    <div class="view-toggle">
      <button id="vChart" class="active">組織図</button>
      <button id="vList">リスト</button>
      <button id="vHistory">履歴</button>
    </div>
    <div class="toolbar" id="chartTools">
      <button class="btn primary" id="btnAdd">＋新規メンバー</button>
      <button class="btn" id="btnFit">全体表示</button>
      <button class="btn" id="btnReset">レイアウト初期化</button>
    </div>
    <div class="toolbar" id="zoomTools">
      <button class="btn" id="btnZoomOut">－</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="btn" id="btnZoomIn">＋</button>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="名前・部署・役職で検索" />
    </div>
    <div id="adminControl" style="display:flex; gap:6px; align-items:center; margin-left:8px;">
      <span class="admin-pill" id="adminPill" style="display:none;">管理者</span>
      <button class="btn" id="btnAdminLogin">管理者ログイン</button>
      <button class="btn" id="btnAdminLogout" style="display:none;">ログアウト</button>
    </div>
  </header>

  <div class="snapshot-banner hide" id="snapBanner">
    <span id="snapBannerText">📸 過去/未来の組織図を表示中</span>
    <button id="snapExit">現在の組織図に戻る</button>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas" id="canvas">
      <svg id="lines"></svg>
    </div>
    <div class="hint">カードをドラッグ＝移動／背景ドラッグ＝全体移動／ホイール＝ズーム／鉛筆アイコン＝編集</div>
  </div>
  <div class="history-wrap hide" id="historyWrap">
    <div class="history-head">
      <h2>組織図の履歴</h2>
      <button class="btn primary snap-take" id="btnSnapTake">📸 現在の状態を記録</button>
      <label class="btn" style="cursor:pointer;">
        📥 JSON読込
        <input type="file" id="snapImportInput" accept="application/json" style="display:none;" />
      </label>
    </div>
    <div class="snap-list" id="snapList"></div>
  </div>

  <div class="list-wrap hide" id="listWrap">
    <div class="list-toolbar">
      <button class="btn primary" id="btnAddList">＋新規メンバー</button>
      <select class="filter" id="lfDept"><option value="">すべての部署</option></select>
      <select class="filter" id="lfStatus">
        <option value="">すべてのステータス</option>
        <option value="active">在籍中</option>
        <option value="産休">産休</option>
        <option value="育休">育休</option>
        <option value="休職中">休職中</option>
      </select>
      <span class="list-count" id="listCount"></span>
    </div>
    <table class="member-table" id="memberTable">
      <thead>
        <tr>
          <th></th>
          <th data-sort="name">名前</th>
          <th data-sort="role">役職</th>
          <th data-sort="division">部門</th>
          <th data-sort="section">課</th>
          <th data-sort="jobType">職種</th>
          <th data-sort="parent">所属長</th>
          <th data-sort="status">ステータス</th>
          <th data-sort="joined">入社／生年</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="snapModalBg">
  <div class="modal" role="dialog" aria-modal="true">
    <h3>📸 組織図を記録</h3>
    <div class="modal-sub">現在の組織図に名前を付けて記録します</div>

// ===== Rank =====
// 0:役員/社長, 1:執行役員, 2:部長, 3:グループマネ, 4:マネ, 5:サブマネ, 6:リーダー, 7:メンバー
// 部署ボックスは親の階層+0.5（上下のランク帯の間に置く）
function rankOfPerson(role) {
  const r = role || "";
  if (r.includes("社長")) return 0;
  if (r === "役員" || (r.includes("役員") && !r.includes("執行"))) return 0;
  if (r.includes("執行役員")) return 1;
  if (r.includes("部長")) return 2;
  if (r.includes("グループマネージャー")) return 3;
  if (r.includes("マネージャー") && !r.includes("サブ") && !r.includes("グループ")) return 4;
  if (r.includes("サブマネージャー")) return 5;
  if (r.includes("リーダー")) return 6;
  return 7;
}
function rankOf(d) {
  if (d.kind === "dept") {
    const parent = STATE.byId && STATE.byId[d.parent];
    if (parent) return rankOf(parent) + 0.5;
    return 0.5;
  }
  return rankOfPerson(d.role);
}
const RANK_LABELS = ["役員 / 社長", "執行役員", "部長", "グループマネージャー", "マネージャー", "サブマネージャー", "リーダー", "メンバー"];

// ===== Layout =====
const NODE_W = 132;
const NODE_H_PERSON = 130;
const NODE_H_DEPT = 56;
const H_GAP = 14;
const RANK_GAP = 90;

function buildTree() {
  const byId = Object.fromEntries(DATA.map(d => {
    const node = { ...d, children: [] };
    // Auto-migrate legacy `dept` → division/section/jobType if not already set
    if (node.dept && (!node.division && !node.section && !node.jobType)) {
      const mig = DEPT_MIGRATION[node.dept];
      if (mig) {
        node.division = mig.division;
        node.section = mig.section;
        node.jobType = mig.jobType;
      }
    }
    return [d.id, node];
  }));
  const roots = [];
  for (const d of DATA) {
    const node = byId[d.id];
    if (d.parent && byId[d.parent]) byId[d.parent].children.push(node);
    else roots.push(node);
  }
  return { byId, roots };
}

// Layout: leaves under same parent arrange in compact N-column grid (max 2 wide).
// Internal nodes use tidy tree (centered over their subtree).
const LEAF_COLS = 2;
const LEAF_ROW_GAP = 14;

function layoutX(node, cursor) {
  if (node.children.length === 0) {
    node.x = cursor.x;
    node.gridRow = 0; node.gridCol = 0;
    cursor.x += NODE_W + H_GAP;
    return;
  }
  const leafKids = node.children.filter(c => c.children.length === 0);
  const innerKids = node.children.filter(c => c.children.length > 0);

  const startX = cursor.x;
  const placedXs = [];

  // place leaf cluster as 2-column grid
  if (leafKids.length > 0) {
    const cols = Math.min(LEAF_COLS, leafKids.length);
    const baseX = cursor.x;
    leafKids.forEach((c, i) => {
      c.gridCol = i % cols;
      c.gridRow = Math.floor(i / cols);
      c.x = baseX + c.gridCol * (NODE_W + H_GAP);
    });
    // center of leaf cluster
    placedXs.push(baseX + (cols * (NODE_W + H_GAP) - H_GAP) / 2 - NODE_W / 2);
    cursor.x = baseX + cols * (NODE_W + H_GAP);
  }

  // place inner subtrees side-by-side
  for (const c of innerKids) {
    layoutX(c, cursor);
    placedXs.push(c.x);
  }

  if (placedXs.length === 1) {
    node.x = placedXs[0];
  } else {
    node.x = (placedXs[0] + placedXs[placedXs.length - 1]) / 2;
  }
}

function autoLayout(roots) {
  const cursor = { x: 0 };
  for (const r of roots) {
    layoutX(r, cursor);
    cursor.x += H_GAP * 3;
  }
  // Two-pass Y assignment:
  // 1) persons at strict rank rows (active only)
  // 2) dept boxes positioned just below parent
  // 3) on-leave members at bottom in a separate row
  let maxActiveY = 0;
  for (const d of Object.values(STATE.byId)) {
    if (d.kind === "person") {
      if (d.status && d.status !== "active") continue; // handled below
      const baseY = rankOfPerson(d.role) * (NODE_H_PERSON + RANK_GAP);
      const rowOffset = (d.gridRow || 0) * (NODE_H_PERSON + LEAF_ROW_GAP);
      d.y = baseY + rowOffset;
      maxActiveY = Math.max(maxActiveY, d.y + NODE_H_PERSON);
    }
  }
  for (const d of Object.values(STATE.byId)) {
    if (d.kind === "dept") {
      const parent = STATE.byId[d.parent];
      const parentH = parent ? (parent.kind === "dept" ? NODE_H_DEPT : NODE_H_PERSON) : NODE_H_PERSON;
      d.y = (parent ? parent.y : 0) + parentH + 24;
      maxActiveY = Math.max(maxActiveY, d.y + NODE_H_DEPT);
    }
  }
  // Lay out leave members at bottom, grouped by status
  const leaveMembers = Object.values(STATE.byId).filter(d => d.kind === "person" && d.status && d.status !== "active");
  if (leaveMembers.length > 0) {
    const order = { "産休": 0, "育休": 1, "休職中": 2 };
    leaveMembers.sort((a, b) => (order[a.status] - order[b.status]) || a.name.localeCompare(b.name));
    const leaveY = maxActiveY + 80; // gap below active org
    let x = 0;
    for (const d of leaveMembers) {
      d.x = x;
      d.y = leaveY;
      x += NODE_W + H_GAP;
    }
    STATE.leaveSectionY = leaveY;
    STATE.leaveSectionX = -50;
  } else {
    STATE.leaveSectionY = null;
  }
}

// ===== Avatar =====
function avatarColor(seed) {
  let h = 0; for (const ch of seed) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return `hsl(${h % 360} 55% 86%)`;
}
function avatarInk(seed) {
  let h = 0; for (const ch of seed) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return `hsl(${h % 360} 55% 30%)`;
}
// Use per-member face PNG (auto-cropped via OpenCV card detection)
// If member has a custom faceSrc (uploaded photo), use that instead.
function faceImgSrc(id) {
  const d = STATE && STATE.byId && STATE.byId[id];
  if (d && d.faceSrc) return d.faceSrc;
  return `assets/faces/${id}.png`;
}

const canvas = document.getElementById("canvas");
const linesSvg = document.getElementById("lines");
const canvasWrap = document.getElementById("canvasWrap");
const zoomLabel = document.getElementById("zoomLabel");
const qEl = document.getElementById("q");

const STATE = { byId: {}, roots: [], scale: 1, tx: 0, ty: 0, nodeEls: new Map() };

function nodeHeight(d) { return d.kind === "dept" ? NODE_H_DEPT : NODE_H_PERSON; }

function render() {
  STATE.nodeEls.forEach(el => el.remove());
  STATE.nodeEls.clear();
  // remove old bands and labels
  canvas.querySelectorAll(".rank-band, .rank-band-label").forEach(el => el.remove());
  linesSvg.innerHTML = "";

  // compute canvas bounds
  let minX = Infinity, maxX = -Infinity;
  for (const d of Object.values(STATE.byId)) {
    minX = Math.min(minX, d.x);
    maxX = Math.max(maxX, d.x + NODE_W);
  }
  const bandWidth = maxX - minX + 200;

  // rank bands
  for (let r = 0; r < RANK_LABELS.length; r++) {
    const band = document.createElement("div");
    band.className = "rank-band";
    band.style.top = (r * (NODE_H_PERSON + RANK_GAP) - 10) + "px";
    band.style.left = (minX - 100) + "px";
    band.style.width = bandWidth + "px";
    band.style.height = (NODE_H_PERSON + 20) + "px";
    canvas.appendChild(band);
    const label = document.createElement("div");
    label.className = "rank-band-label";
    label.style.top = (r * (NODE_H_PERSON + RANK_GAP) + 4) + "px";
    label.style.left = (minX - 90) + "px";
    label.textContent = `L${r}  ${RANK_LABELS[r]}`;
    canvas.appendChild(label);
  }

  // nodes
  for (const d of Object.values(STATE.byId)) {
    const el = document.createElement("div");
    el.className = "node" + (d.kind === "dept" ? " dept-rect" : "");
    el.dataset.id = d.id;
    if (d.kind === "person") {
      const avStyle = `background:${avatarColor(d.name)};color:${avatarInk(d.name)};`;
      const imgTag = `<img src="${faceImgSrc(d.id)}" alt="" onerror="this.style.display='none'">`;
      const statusCls = { "産休": "sankyu", "育休": "ikukyu", "休職中": "kyushoku" }[d.status] || "";
      const statusBadge = (d.status && d.status !== "active")
        ? `<div class="status-badge ${statusCls}">${d.status}</div>` : "";
      if (d.status && d.status !== "active") el.classList.add("on-leave");
      el.innerHTML = `
        <button class="edit-btn" data-edit="${d.id}" title="編集">✎</button>
        ${statusBadge}
        <div class="avatar" style="${avStyle}">${imgTag}<span style="position:relative;z-index:-1">${d.name[0]}</span></div>
        <div class="node-role">${d.role}</div>
        <div class="node-name">${d.name}</div>
        <div class="node-meta">${d.joined || ""}${d.birth ? "<br>" + d.birth : ""}</div>
      `;
    } else {
      el.innerHTML = `
        <button class="edit-btn" data-edit="${d.id}" title="編集">✎</button>
        <div class="dept-title">${d.name}</div>
        <div class="dept-sub">${d.role || ""}</div>
      `;
    }
    el.style.left = d.x + "px";
    el.style.top = d.y + "px";
    attachDrag(el, d);
    canvas.appendChild(el);
    STATE.nodeEls.set(d.id, el);
  }
  // Leave-section label
  if (STATE.leaveSectionY != null) {
    const label = document.createElement("div");
    label.className = "leave-section-label";
    label.textContent = "🌸 産休・育休・休職中";
    label.style.left = (STATE.leaveSectionX || 0) + "px";
    label.style.top = (STATE.leaveSectionY - 40) + "px";
    canvas.appendChild(label);
  }
  drawLines();
  updateBounds();
}

function drawLines() {
  let svg = "";
  for (const d of Object.values(STATE.byId)) {
    if (!d.parent) continue;
    // skip lines for on-leave members (they're in a separate section)
    if (d.kind === "person" && d.status && d.status !== "active") continue;
    const p = STATE.byId[d.parent];
    if (!p) continue;
    const x1 = p.x + NODE_W / 2;
    const y1 = p.y + nodeHeight(p);
    const x2 = d.x + NODE_W / 2;
    const y2 = d.y;
    const my = (y1 + y2) / 2;
    svg += `<path d="M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4 4" />`;
  }
  linesSvg.innerHTML = svg;
}

function updateBounds() {
  let maxX = 0, maxY = 0;
  for (const d of Object.values(STATE.byId)) {
    maxX = Math.max(maxX, d.x + NODE_W);
    maxY = Math.max(maxY, d.y + nodeHeight(d));
  }
  linesSvg.setAttribute("width", maxX + 200);
  linesSvg.setAttribute("height", maxY + 200);
}

function applyTransform() {
  canvas.style.transform = `translate(${STATE.tx}px, ${STATE.ty}px) scale(${STATE.scale})`;
  zoomLabel.textContent = Math.round(STATE.scale * 100) + "%";
}

// ===== Node Drag =====
function attachDrag(el, d) {
  let startX, startY, startLeft, startTop, dragging = false;
  el.addEventListener("pointerdown", e => {
    // Don't drag when clicking edit button
    if (e.target.closest(".edit-btn")) return;
    e.stopPropagation();
    dragging = true;
    el.classList.add("dragging");
    el.setPointerCapture(e.pointerId);
    startX = e.clientX; startY = e.clientY;
    startLeft = d.x; startTop = d.y;
  });
  el.addEventListener("pointermove", e => {
    if (!dragging) return;
    const dx = (e.clientX - startX) / STATE.scale;
    const dy = (e.clientY - startY) / STATE.scale;
    d.x = startLeft + dx;
    d.y = startTop + dy;
    el.style.left = d.x + "px";
    el.style.top = d.y + "px";
    drawLines();
    updateBounds();
  });
  el.addEventListener("pointerup", () => { dragging = false; el.classList.remove("dragging"); });
  el.addEventListener("pointercancel", () => { dragging = false; el.classList.remove("dragging"); });
}

// ===== Canvas Pan =====
let panning = false, panStart = null;
canvasWrap.addEventListener("pointerdown", e => {
  if (e.target !== canvasWrap) return;
  panning = true;
  canvasWrap.classList.add("panning");
  panStart = { x: e.clientX, y: e.clientY, tx: STATE.tx, ty: STATE.ty };
  canvasWrap.setPointerCapture(e.pointerId);
});
canvasWrap.addEventListener("pointermove", e => {
  if (!panning) return;
  STATE.tx = panStart.tx + (e.clientX - panStart.x);
  STATE.ty = panStart.ty + (e.clientY - panStart.y);
  applyTransform();
});
canvasWrap.addEventListener("pointerup", () => { panning = false; canvasWrap.classList.remove("panning"); });

// ===== Wheel Zoom =====
canvasWrap.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = -e.deltaY * 0.0015;
  const oldScale = STATE.scale;
  const newScale = Math.min(2.5, Math.max(0.15, oldScale * (1 + delta)));
  const k = newScale / oldScale;
  STATE.tx = mx - k * (mx - STATE.tx);
  STATE.ty = my - k * (my - STATE.ty);
  STATE.scale = newScale;
  applyTransform();
}, { passive: false });

function fitToView() {
  let maxX = -Infinity, maxY = -Infinity, minX = Infinity, minY = Infinity;
  for (const d of Object.values(STATE.byId)) {
    minX = Math.min(minX, d.x);
    minY = Math.min(minY, d.y);
    maxX = Math.max(maxX, d.x + NODE_W);
    maxY = Math.max(maxY, d.y + nodeHeight(d));
  }
  minX -= 120; minY -= 30; // include band label
  const w = maxX - minX, h = maxY - minY;
  const rect = canvasWrap.getBoundingClientRect();
  const pad = 30;
  const sx = (rect.width - pad * 2) / w;
  const sy = (rect.height - pad * 2) / h;
  STATE.scale = Math.min(sx, sy, 1);
  STATE.tx = pad - minX * STATE.scale + (rect.width - pad * 2 - w * STATE.scale) / 2;
  STATE.ty = pad - minY * STATE.scale + (rect.height - pad * 2 - h * STATE.scale) / 2;
  applyTransform();
}

function init() {
  const { byId, roots } = buildTree();
  STATE.byId = byId; STATE.roots = roots;
  autoLayout(roots);
  render();
  fitToView();
}

document.getElementById("btnFit").addEventListener("click", fitToView);

document.getElementById("btnZoomIn").addEventListener("click", () => {
  const rect = canvasWrap.getBoundingClientRect();
  const mx = rect.width / 2, my = rect.height / 2;
  const oldScale = STATE.scale;
  STATE.scale = Math.min(2.5, oldScale * 1.2);
  const k = STATE.scale / oldScale;
  STATE.tx = mx - k * (mx - STATE.tx);
  STATE.ty = my - k * (my - STATE.ty);
  applyTransform();
});
document.getElementById("btnZoomOut").addEventListener("click", () => {
  const rect = canvasWrap.getBoundingClientRect();
  const mx = rect.width / 2, my = rect.height / 2;
  const oldScale = STATE.scale;
  STATE.scale = Math.max(0.15, oldScale / 1.2);
  const k = STATE.scale / oldScale;
  STATE.tx = mx - k * (mx - STATE.tx);
  STATE.ty = my - k * (my - STATE.ty);
  applyTransform();
});

function descendantIds(id) {
  // collect all descendants (to prevent picking a descendant as parent)
  const out = new Set();
  function walk(curId) {
    for (const k of Object.keys(STATE.byId)) {
      if (STATE.byId[k].parent === curId) {
        out.add(k);
        walk(k);
      }
    }
  }
  walk(id);
  return out;
}

// Cascading dropdowns for 部門 → 課 → 職種
function fillDivisionSelect(current) {
  const opts = [{ value: "", label: "（未設定）" }, ...DIVISION_OPTIONS.map(v => ({ value: v, label: v }))];
  fillSelect(mDivision, opts, current);
}
function fillSectionSelect(division, current) {
  const allowed = division ? (DIVISION_TO_SECTIONS[division] || []) : SECTION_OPTIONS;
  const opts = [{ value: "", label: "（未設定）" }, ...allowed.map(v => ({ value: v, label: v }))];
  fillSelect(mSection, opts, allowed.includes(current) ? current : "");
}
function fillJobSelect(section, current) {
  const allowed = section ? (SECTION_TO_JOBS[section] || []) : JOB_OPTIONS;
  const opts = [{ value: "", label: "（未設定）" }, ...allowed.map(v => ({ value: v, label: v }))];
  fillSelect(mJob, opts, allowed.includes(current) ? current : "");
}

function fillSelect(sel, options, current) {
  sel.innerHTML = "";
  let hasCurrent = false;
  for (const o of options) {
    const opt = document.createElement("option");
    opt.value = o.value;
    opt.textContent = o.label;
    if (o.value === current) { opt.selected = true; hasCurrent = true; }
    sel.appendChild(opt);
  }
  // If current isn't in the list, add it at the top
  if (current && !hasCurrent) {
    const opt = document.createElement("option");
    opt.value = current;
    opt.textContent = current + " (現在)";
    opt.selected = true;
    sel.insertBefore(opt, sel.firstChild);
  }
}

function openEditor(id) {
  isAddMode = false;
  pendingFaceSrc = null;
  pendingFaceReset = false;
  const d = STATE.byId[id];
  if (!d) return;
  editingId = id;
  mName.textContent = d.name + (d.kind === "dept" ? " (部署)" : "");
  // Name editing available in edit mode too
  mNameInputWrap.style.display = "block";
  mNameInput.value = d.name;
  mPhotoWrap.style.display = d.kind === "person" ? "block" : "none";
  mPhotoInput.value = "";
  document.getElementById("mPhotoReset").style.display = (d.kind === "person" && d.faceSrc) ? "inline-block" : "none";
  mJoinedWrap.style.display = d.kind === "person" ? "block" : "none";
  mJoinedInput.value = d.joined || "";
  mBirthWrap.style.display = d.kind === "person" ? "block" : "none";
  mBirthInput.value = d.birth || "";
  // Allow delete for any person
  mDelete.style.display = d.kind === "person" ? "block" : "none";
  mSub.textContent = d.kind === "person"
    ? `${d.dept || ""}${d.joined ? "・" + d.joined : ""}`
    : "部署ボックス";

  // avatar
  if (d.kind === "person") {
    mAvatar.innerHTML = `<img src="${faceImgSrc(d.id)}" onerror="this.style.display='none'"><span>${d.name[0]}</span>`;
  } else {
    mAvatar.innerHTML = "🏢";
  }

  // role select
  const roleOpts = ROLE_OPTIONS.map(r => ({ value: r, label: r }));
  fillSelect(mRole, roleOpts, d.role);
  // 3-level organization selects (cascading: 部門 → 課 → 職種)
  fillDivisionSelect(d.division || "");
  fillSectionSelect(d.division || "", d.section || "");
  fillJobSelect(d.section || "", d.jobType || "");
  // 所属長 select: only リーダー以上 (rank 0-6), exclude self + descendants
  const banned = descendantIds(id);
  banned.add(id);
  const parentOpts = [{ value: "", label: "（なし）" }];
  const eligible = [];
  for (const k of Object.keys(STATE.byId)) {
    if (banned.has(k)) continue;
    const n = STATE.byId[k];
    if (n.kind !== "person") continue;
    if (rankOfPerson(n.role) > 6) continue; // exclude メンバー/パートナー
    eligible.push({ value: k, label: `${n.name}（${n.role}）` });
  }
  eligible.sort((a, b) => a.label.localeCompare(b.label, "ja"));
  for (const p of eligible) parentOpts.push(p);

  fillSelect(mParent, parentOpts, d.parent || "");

  // Toggle field visibility (hide label + select together)
  const setField = (sel, visible) => {
    sel.style.display = visible ? "block" : "none";
    const lab = sel.previousElementSibling;
    if (lab && lab.tagName === "LABEL") lab.style.display = visible ? "block" : "none";
  };
  setField(mDivision, d.kind === "person");
  setField(mSection, d.kind === "person");
  setField(mJob, d.kind === "person");
  setField(mStatus, d.kind === "person");
  if (d.kind === "person") mStatus.value = d.status || "active";

  modalBg.classList.add("show");
  setTimeout(() => mRole.focus(), 50);
}

}

    if (!name) { alert("名前を入力してください"); mNameInput.focus(); return; }
    const id = "new_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    const newMember = {
      id, kind: "person", name,
      role: mRole.value,
      division: mDivision.value,
      section: mSection.value,
      jobType: mJob.value,
      dept: "", // legacy, unused going forward
      joined: mJoinedInput.value.trim(),
      birth: mBirthInput.value.trim(),
      parent: mParent.value || null,
      status: mStatus.value || "active",
      face: null,
      faceSrc: pendingFaceSrc || null,
      children: [],
    };
    STATE.byId[id] = newMember;
    rebuildTree();
    autoLayout(STATE.roots);
    render();
    persist();
    closeEditor();
    if (!listWrap.classList.contains("hide")) renderList();
    return;
  }
  if (!editingId) return;
  const d = STATE.byId[editingId];
  const newName = mNameInput.value.trim();

    d.jobType = mJob.value;
    d.status = mStatus.value;
    d.joined = mJoinedInput.value.trim();
    d.birth = mBirthInput.value.trim();
    if (pendingFaceReset) d.faceSrc = null;
    else if (pendingFaceSrc) d.faceSrc = pendingFaceSrc;
  }
  d.parent = mParent.value || null;
  rebuildTree();
  autoLayout(STATE.roots);
  render();
  persist();
  closeEditor();
  if (!listWrap.classList.contains("hide")) renderList();
});

mDelete.addEventListener("click", () => {
  if (!editingId) return;
  const d = STATE.byId[editingId];
  if (!confirm(`「${d.name}」さんを削除しますか？\n配下メンバーは ${d.parent ? "上司に再接続" : "ルートに移動"} されます。`)) return;
  // Reassign children to this node's parent (or null)
  const newParent = d.parent || null;
  for (const n of Object.values(STATE.byId)) {
    if (n.parent === editingId) n.parent = newParent;
  }
  delete STATE.byId[editingId];
  rebuildTree();
  autoLayout(STATE.roots);
  render();
  persist();
  closeEditor();
  if (!listWrap.classList.contains("hide")) renderList();
});

// Re-build the children arrays after parent changes
function rebuildTree() {
  for (const n of Object.values(STATE.byId)) n.children = [];
  STATE.roots = [];
  for (const n of Object.values(STATE.byId)) {
    if (n.parent && STATE.byId[n.parent]) STATE.byId[n.parent].children.push(n);
    else STATE.roots.push(n);
  }
}

// ===== LocalStorage persistence =====
const STORAGE_KEY = "orgnavi_state_v1";

function persist() {
  const data = {};
  const newMembers = [];
  // Track original DATA IDs that have been removed
  const originalIds = new Set(DATA.map(d => d.id));
  const currentIds = new Set(Object.keys(STATE.byId));
  const deleted = [...originalIds].filter(id => !currentIds.has(id));
  for (const id of Object.keys(STATE.byId)) {
    const n = STATE.byId[id];
    if (id.startsWith("new_")) {
      newMembers.push({
        id, name: n.name, role: n.role,
        division: n.division, section: n.section, jobType: n.jobType,
        dept: n.dept,
        joined: n.joined, birth: n.birth, parent: n.parent,
        status: n.status, faceSrc: n.faceSrc, kind: n.kind,
        x: n.x, y: n.y,
      });
    } else {
      data[id] = {
        name: n.name,
        role: n.role,
        division: n.division, section: n.section, jobType: n.jobType,
        dept: n.dept, parent: n.parent,
        status: n.status, x: n.x, y: n.y,
        faceSrc: n.faceSrc, joined: n.joined, birth: n.birth,
      };
    }
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ data, newMembers, deleted })); } catch {}
}

function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    // Backward compatibility: old format was a flat object of {id: changes}
    const data = parsed.data || parsed;
    const newMembers = parsed.newMembers || [];
    const deleted = parsed.deleted || [];
    for (const id of Object.keys(data)) {
      if (!STATE.byId[id]) continue;
      const saved = data[id];
      if (saved.name !== undefined) STATE.byId[id].name = saved.name;
      if (saved.role !== undefined) STATE.byId[id].role = saved.role;
      if (saved.dept !== undefined) STATE.byId[id].dept = saved.dept;
      if (saved.division !== undefined) STATE.byId[id].division = saved.division;
      if (saved.section !== undefined) STATE.byId[id].section = saved.section;
      if (saved.jobType !== undefined) STATE.byId[id].jobType = saved.jobType;
      if (saved.parent !== undefined) STATE.byId[id].parent = saved.parent;
      if (saved.status) STATE.byId[id].status = saved.status;
      if (saved.faceSrc !== undefined) STATE.byId[id].faceSrc = saved.faceSrc;
      if (saved.joined !== undefined) STATE.byId[id].joined = saved.joined;
      if (saved.birth !== undefined) STATE.byId[id].birth = saved.birth;
      if (typeof saved.x === "number") STATE.byId[id].x = saved.x;
      if (typeof saved.y === "number") STATE.byId[id].y = saved.y;
    }
    for (const m of newMembers) {
      STATE.byId[m.id] = { ...m, kind: m.kind || "person", children: [] };
    }
    // Remove originally-deleted members
    for (const id of deleted) delete STATE.byId[id];
    rebuildTree();
    return true;
  } catch { return false; }
}

document.getElementById("btnReset").addEventListener("click", (e) => {
  e.stopImmediatePropagation();
  if (!confirm("レイアウトと編集内容を初期化しますか？")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}, true);

// Override init to support persistence
function initWithPersist() {
  const { byId, roots } = buildTree();
  STATE.byId = byId; STATE.roots = roots;
  const restored = loadPersisted();
  if (!restored) {
    autoLayout(roots);
  }
  render();
  fitToView();
}

function buildDeptFilterOptions() {
  const depts = new Set();
  for (const d of Object.values(STATE.byId)) {
    if (d.kind === "person" && d.dept) depts.add(d.dept);
  }
  const current = lfDept.value;
  lfDept.innerHTML = '<option value="">すべての部署</option>' +
    [...depts].sort().map(d => `<option value="${d}">${d}</option>`).join("");
  lfDept.value = current;
}

function parentLabel(parentId) {
  if (!parentId) return "（なし）";
  const p = STATE.byId[parentId];
  if (!p) return "（不明）";
  return p.kind === "dept" ? `[部署] ${p.name}` : `${p.name}（${p.role}）`;
}

function statusBadgeHTML(s) {
  if (!s || s === "active") return '<span style="color:#22c55e;font-size:11px">● 在籍中</span>';
  const colors = {
    "産休": ["#fce7f3", "#9d174d"],
    "育休": ["#dbeafe", "#1e3a8a"],
    "休職中": ["#f3f4f6", "#374151"],
  };
  const [bg, fg] = colors[s] || ["#fef3c7", "#92400e"];
  return `<span style="background:${bg};color:${fg};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${s}</span>`;
}

function compareMembers(a, b, key, dir) {
  let av, bv;
  if (key === "name") { av = a.name; bv = b.name; }
  else if (key === "role") { av = a.role || ""; bv = b.role || ""; }
  else if (key === "dept") { av = a.dept || ""; bv = b.dept || ""; }
  else if (key === "parent") { av = parentLabel(a.parent); bv = parentLabel(b.parent); }
  else if (key === "status") { av = a.status || "active"; bv = b.status || "active"; }
  else if (key === "joined") { av = a.joined || ""; bv = b.joined || ""; }
  else if (key === "rank") {
    const ra = rankOfPerson(a.role), rb = rankOfPerson(b.role);
    if (ra !== rb) return (ra - rb) * (dir === "asc" ? 1 : -1);
    av = a.name; bv = b.name;
  }
  const r = String(av).localeCompare(String(bv), "ja");
  return dir === "asc" ? r : -r;
}

function renderList() {
  buildDeptFilterOptions();
  const q = qEl.value.trim().toLowerCase();
  const fd = lfDept.value;
  const fs = lfStatus.value;
  let members = Object.values(STATE.byId).filter(d => d.kind === "person");
  members = members.filter(d => {
    if (fd && d.dept !== fd) return false;
    if (fs && (d.status || "active") !== fs) return false;
    if (!q) return true;
    const hay = [d.name, d.role, d.dept, d.joined, d.birth].filter(Boolean).join(" ").toLowerCase();
    return hay.includes(q);
  });
  members.sort((a, b) => compareMembers(a, b, listSort.key, listSort.dir));
  listCount.textContent = `${members.length}人 / 合計${Object.values(STATE.byId).filter(d => d.kind === "person").length}人`;

  // sort indicator
  document.querySelectorAll("#memberTable th[data-sort]").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.sort === listSort.key) th.classList.add(`sort-${listSort.dir}`);
  });

  // Build options once
  const banned = new Set(); // for global use - we filter per-row below
  const roleOptionsHTML = ROLE_OPTIONS.map(r => `<option value="${r}">${r}</option>`).join("");
  const divisionOptionsHTML = '<option value="">（未設定）</option>' + DIVISION_OPTIONS.map(d => `<option value="${d}">${d}</option>`).join("");
  const sectionOptionsHTML = '<option value="">（未設定）</option>' + SECTION_OPTIONS.map(d => `<option value="${d}">${d}</option>`).join("");
  const jobOptionsHTML = '<option value="">（未設定）</option>' + JOB_OPTIONS.map(d => `<option value="${d}">${d}</option>`).join("");
  const statusOptionsHTML = `<option value="active">在籍中</option><option value="産休">産休</option><option value="育休">育休</option><option value="休職中">休職中</option>`;

  // 所属長 options (only リーダー以上)
  const eligibleMgr = Object.values(STATE.byId)
    .filter(d => d.kind === "person" && rankOfPerson(d.role) <= 6)
    .sort((a, b) => a.name.localeCompare(b.name, "ja"))
    .map(d => ({ id: d.id, label: `${d.name}（${d.role}）` }));

  memberTbody.innerHTML = "";
  for (const m of members) {
    const tr = document.createElement("tr");
    if (m.status && m.status !== "active") tr.classList.add("on-leave-row");
    tr.dataset.id = m.id;

    // 所属長 options exclude self + descendants
    const desc = descendantIds(m.id);
    desc.add(m.id);
    const parentHTML = '<option value="">（なし）</option>' +
      eligibleMgr
        .filter(o => !desc.has(o.id))
        .map(o => `<option value="${o.id}">${o.label}</option>`)
        .join("");

    tr.innerHTML = `
      <td>
        <div class="table-avatar">
          <img src="${faceImgSrc(m.id)}" onerror="this.style.display='none'">
          <span style="position:relative;z-index:-1">${m.name[0]}</span>
        </div>
      </td>
      <td class="name-cell"><input type="text" class="cell-input" data-field="name" value="${m.name.replace(/"/g,'&quot;')}" /></td>
      <td><select class="cell-select" data-field="role">${roleOptionsHTML}</select></td>
      <td><select class="cell-select" data-field="division">${divisionOptionsHTML}</select></td>
      <td><select class="cell-select" data-field="section">${sectionOptionsHTML}</select></td>
      <td><select class="cell-select" data-field="jobType">${jobOptionsHTML}</select></td>
      <td><select class="cell-select" data-field="parent">${parentHTML}</select></td>
      <td class="status-cell"><select class="cell-select" data-field="status">${statusOptionsHTML}</select></td>
      <td class="meta-cell">${m.joined || ""}${m.birth ? "<br>" + m.birth : ""}</td>
      <td><button class="row-delete" data-del="${m.id}" title="削除">✕</button></td>
    `;
    // Set select values; if not in list, add as a custom option
    const setSel = (field, value) => {
      const sel = tr.querySelector(`select[data-field="${field}"]`);
      let found = false;
      for (const opt of sel.options) {
        if (opt.value === value) { opt.selected = true; found = true; break; }
      }
      if (!found && value) {
        const o = document.createElement("option");
        o.value = value;
        o.textContent = value + " (現在)";
        o.selected = true;
        sel.insertBefore(o, sel.firstChild);
      }
    };
    setSel("role", m.role);
    setSel("division", m.division || "");
    setSel("section", m.section || "");
    setSel("jobType", m.jobType || "");
    setSel("parent", m.parent || "");
    setSel("status", m.status || "active");

    // Live edit handlers
    tr.querySelectorAll("select.cell-select").forEach(sel => {
      sel.addEventListener("change", () => {
        const field = sel.dataset.field;
        if (field === "parent") m.parent = sel.value || null;
        else if (field === "status") m.status = sel.value;
        else m[field] = sel.value;
        rebuildTree();
        autoLayout(STATE.roots);
        render();
        persist();
        if (m.status && m.status !== "active") tr.classList.add("on-leave-row");
        else tr.classList.remove("on-leave-row");
      });
    });
    // Name input
    const nameIn = tr.querySelector('input[data-field="name"]');
    nameIn.addEventListener("change", () => {
      const v = nameIn.value.trim();
      if (!v) { nameIn.value = m.name; return; }
      m.name = v;
      render();
      persist();
    });
    // Delete button
    const delBtn = tr.querySelector(".row-delete");
    delBtn.addEventListener("click", () => {
      if (!confirm(`「${m.name}」さんを削除しますか？\n配下メンバーは ${m.parent ? "上司に再接続" : "ルートに移動"} されます。`)) return;
      const newParent = m.parent || null;
      for (const n of Object.values(STATE.byId)) {
        if (n.parent === m.id) n.parent = newParent;
      }
      delete STATE.byId[m.id];
      rebuildTree();
      autoLayout(STATE.roots);
      render();
      persist();
      renderList();
    });

    memberTbody.appendChild(tr);
  }
}

// ===== Snapshots =====
const SNAPSHOT_KEY = "orgnavi_snapshots_v1";

function getSnapshots() {
  try { return JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || "[]"); } catch { return []; }
}
function setSnapshots(list) {
  localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(list));
}

function captureCurrentState() {
  const data = {};
  const newMembers = [];
  const originalIds = new Set(DATA.map(d => d.id));
  const currentIds = new Set(Object.keys(STATE.byId));
  const deleted = [...originalIds].filter(id => !currentIds.has(id));
  for (const id of Object.keys(STATE.byId)) {
    const n = STATE.byId[id];
    if (id.startsWith("new_")) {
      newMembers.push({
        id, name: n.name, role: n.role, dept: n.dept,
        joined: n.joined, birth: n.birth, parent: n.parent,
        status: n.status, faceSrc: n.faceSrc, kind: n.kind,
        x: n.x, y: n.y,
      });
    } else {
      data[id] = {
        name: n.name, role: n.role, dept: n.dept, parent: n.parent,
        status: n.status, x: n.x, y: n.y,
        faceSrc: n.faceSrc, joined: n.joined, birth: n.birth,
      };
    }
  }
  return { data, newMembers, deleted };
}

let viewingSnapshotId = null;

function takeSnapshot(title, type, desc) {
  const snapshots = getSnapshots();
  snapshots.unshift({
    id: "snap_" + Date.now().toString(36),
    title, type, desc,
    timestamp: new Date().toISOString(),
    state: captureCurrentState(),
  });
  setSnapshots(snapshots);
  renderSnapList();
}

function deleteSnapshot(id) {
  if (!confirm("この記録を削除しますか？")) return;
  setSnapshots(getSnapshots().filter(s => s.id !== id));
  renderSnapList();
}

function viewSnapshot(id) {
  const snap = getSnapshots().find(s => s.id === id);
  if (!snap) return;
  viewingSnapshotId = id;
  // Apply snapshot state
  const { byId, roots } = buildTree();
  STATE.byId = byId;
  STATE.roots = roots;
  const data = snap.state.data || {};
  const newMembers = snap.state.newMembers || [];
  const deleted = snap.state.deleted || [];
  for (const idK of Object.keys(data)) {
    if (!STATE.byId[idK]) continue;
    const s = data[idK];
    if (s.name !== undefined) STATE.byId[idK].name = s.name;
    if (s.role !== undefined) STATE.byId[idK].role = s.role;
    if (s.dept !== undefined) STATE.byId[idK].dept = s.dept;
    if (s.parent !== undefined) STATE.byId[idK].parent = s.parent;
    if (s.status) STATE.byId[idK].status = s.status;
    if (s.faceSrc !== undefined) STATE.byId[idK].faceSrc = s.faceSrc;
    if (s.joined !== undefined) STATE.byId[idK].joined = s.joined;
    if (s.birth !== undefined) STATE.byId[idK].birth = s.birth;
    if (typeof s.x === "number") STATE.byId[idK].x = s.x;
    if (typeof s.y === "number") STATE.byId[idK].y = s.y;
  }
  for (const m of newMembers) STATE.byId[m.id] = { ...m, kind: m.kind || "person", children: [] };
  for (const idD of deleted) delete STATE.byId[idD];
  rebuildTree();
  autoLayout(STATE.roots);
  render();
  fitToView();
  document.body.classList.add("snapshot-view");
  document.getElementById("snapBanner").classList.remove("hide");
  document.getElementById("snapBannerText").textContent =
    `📸 ${snap.type === "future" ? "未来予定" : "過去"} の組織図: ${snap.title}（${new Date(snap.timestamp).toLocaleDateString("ja-JP")}）`;
  // Switch to chart view
  switchView("chart");
}

function exitSnapshotView() {
  viewingSnapshotId = null;
  document.body.classList.remove("snapshot-view");
  document.getElementById("snapBanner").classList.add("hide");
  // Reload current state
  const { byId, roots } = buildTree();
  STATE.byId = byId; STATE.roots = roots;
  loadPersisted();
  autoLayout(STATE.roots);
  render();
  fitToView();
}

document.getElementById("snapExit").addEventListener("click", exitSnapshotView);

function exportSnapshot(id) {
  const snap = getSnapshots().find(s => s.id === id);
  if (!snap) return;
  const json = JSON.stringify(snap, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `orgnavi-${snap.title.replace(/[^\w　-鿿]/g, "_")}-${snap.id}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.getElementById("snapImportInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const snap = JSON.parse(reader.result);
      if (!snap.id || !snap.state) throw new Error("Invalid format");
      // Re-id to avoid collision
      snap.id = "snap_" + Date.now().toString(36);
      snap.title = (snap.title || "Imported") + " (取込)";
      const snapshots = getSnapshots();
      snapshots.unshift(snap);
      setSnapshots(snapshots);
      renderSnapList();
      alert("読み込みました");
    } catch (err) {
      alert("読み込みに失敗しました: " + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

function renderSnapList() {
  const list = document.getElementById("snapList");
  list.innerHTML = "";
  const snapshots = getSnapshots();
  if (snapshots.length === 0) {
    list.innerHTML = `<div style="grid-column:1/-1; padding:40px; text-align:center; color:var(--sub); font-size:13px;">
      まだ記録がありません。${isAdmin ? "「現在の状態を記録」ボタンから保存できます。" : "管理者にログインしてもらってください。"}
    </div>`;
    return;
  }
  for (const s of snapshots) {
    const card = document.createElement("div");
    card.className = "snap-card";
    card.innerHTML = `
      <div><span class="snap-type ${s.type === "future" ? "future" : "current"}">${s.type === "future" ? "🔮 未来予定" : "📌 現在/過去"}</span></div>
      <div class="snap-title">${s.title}</div>
      <div class="snap-meta">${new Date(s.timestamp).toLocaleString("ja-JP")}</div>
      ${s.desc ? `<div class="snap-desc">${s.desc}</div>` : ""}
      <div class="snap-actions">
        <button data-act="view">表示</button>
        <button class="snap-export" data-act="export">JSON</button>
        <button class="snap-delete" data-act="delete">削除</button>
      </div>
    `;
    card.querySelectorAll("button[data-act]").forEach(b => {
      b.addEventListener("click", () => {
        const act = b.dataset.act;
        if (act === "view") viewSnapshot(s.id);
        else if (act === "delete") deleteSnapshot(s.id);
        else if (act === "export") exportSnapshot(s.id);
      });
    });
    list.appendChild(card);
  }
}

const originalSwitchView = switchView;
switchView = function(view) {
  vChartBtn.classList.toggle("active", view === "chart");
  vListBtn.classList.toggle("active", view === "list");
  vHistoryBtn.classList.toggle("active", view === "history");
  canvasWrap2.classList.toggle("hide", view !== "chart");
  listWrap.classList.toggle("hide", view !== "list");
  historyWrap.classList.toggle("hide", view !== "history");
  chartTools.style.display = view === "chart" ? "" : "none";
  zoomTools.style.display = view === "chart" ? "" : "none";
  if (view === "list") renderList();
  if (view === "history") renderSnapList();
};
vChartBtn.addEventListener("click", () => switchView("chart"));
vListBtn.addEventListener("click", () => switchView("list"));
vHistoryBtn.addEventListener("click", () => switchView("history"));

updateAdminUI();
initWithPersist();
</script>
</body>
</html>
